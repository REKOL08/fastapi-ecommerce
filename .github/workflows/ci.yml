name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1: Tests ──────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🧪 Run tests with pytest
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ""
          DB_NAME: ecommerce_db
          SECRET_KEY: ci-test-secret-key-for-github-actions
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          APP_ENV: testing
        run: |
          pytest tests/ -v --tb=short

  # ── JOB 2: Lint ───────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Check code style with ruff
        run: |
          pip install ruff
          ruff check . --ignore E501,F401

  # ── JOB 3: Build check ────────────────────────────────────────
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🏗️ Verify app imports correctly
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: ""
          DB_NAME: ecommerce_db
          SECRET_KEY: ci-test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          APP_ENV: testing
        run: |
          python -c "from app.core.config import settings; print('✅ Config OK')"
          python -c "from app.core.security import create_access_token; print('✅ Security OK')"
          python -c "from app.models.user import User; print('✅ Models OK')"
          python -c "from app.schemas.user import UserCreate; print('✅ Schemas OK')"
